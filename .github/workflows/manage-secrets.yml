name: Manage Secrets

on:
  workflow_dispatch:
    inputs:
      secret_target:
        description: "Secret target to manage"
        required: true
        default: "speech"
        type: choice
        options:
          - speech
          - github-oauth
      speech_account_name:
        description: "Azure Speech account name"
        required: false
        type: string
      key_vault_name:
        description: "Key Vault name (optional override)"
        required: false
        type: string
      speech_secret_name:
        description: "Key Vault secret name (used for speech target)"
        required: false
        default: "azure-speech-key"
        type: string
      key_slot:
        description: "Speech key slot to read"
        required: false
        default: "key1"
        type: choice
        options:
          - key1
          - key2
      rotate_key:
        description: "Regenerate selected key slot before storing"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: manage-secrets
  cancel-in-progress: false

jobs:
  manage-secrets:
    name: Manage secrets
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Validate required configuration
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          KEY_VAULT_NAME_INPUT: ${{ inputs.key_vault_name }}
          SECRET_TARGET: ${{ inputs.secret_target }}
          SPEECH_ACCOUNT_NAME: ${{ inputs.speech_account_name }}
          AUTH_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_OAUTH_CLIENT_SECRET }}
        run: |
          EFFECTIVE_KEY_VAULT_NAME="${KEY_VAULT_NAME_INPUT:-$AZURE_KEY_VAULT_NAME}"

          if [ -z "$AZURE_CLIENT_ID" ]; then
            echo "Missing GitHub variable: AZURE_CLIENT_ID"
            exit 1
          fi

          if [ -z "$AZURE_TENANT_ID" ]; then
            echo "Missing GitHub variable: AZURE_TENANT_ID"
            exit 1
          fi

          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "Missing GitHub variable: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "Missing GitHub variable: AZURE_RESOURCE_GROUP"
            exit 1
          fi

          if [ -z "$EFFECTIVE_KEY_VAULT_NAME" ]; then
            echo "Missing Key Vault name. Provide workflow input key_vault_name or GitHub variable AZURE_KEY_VAULT_NAME."
            exit 1
          fi

          if [ "$SECRET_TARGET" = "speech" ] && [ -z "$SPEECH_ACCOUNT_NAME" ]; then
            echo "Missing workflow input: speech_account_name (required for speech target)"
            exit 1
          fi

          if [ "$SECRET_TARGET" = "github-oauth" ] && [ -z "$AUTH_GITHUB_OAUTH_CLIENT_SECRET" ]; then
            echo "Missing GitHub secret: AUTH_GITHUB_OAUTH_CLIENT_SECRET"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Rotate Speech key (optional)
        if: ${{ inputs.secret_target == 'speech' && inputs.rotate_key }}
        shell: bash
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SPEECH_ACCOUNT_NAME: ${{ inputs.speech_account_name }}
          KEY_SLOT: ${{ inputs.key_slot }}
        run: |
          echo "Regenerating $KEY_SLOT for Speech account $SPEECH_ACCOUNT_NAME"
          az cognitiveservices account keys regenerate \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SPEECH_ACCOUNT_NAME" \
            --key-name "$KEY_SLOT" \
            --output none

      - name: Read Speech key and store in Key Vault
        if: ${{ inputs.secret_target == 'speech' }}
        shell: bash
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SPEECH_ACCOUNT_NAME: ${{ inputs.speech_account_name }}
          KEY_SLOT: ${{ inputs.key_slot }}
          KEY_VAULT_NAME: ${{ inputs.key_vault_name || vars.AZURE_KEY_VAULT_NAME }}
          SECRET_NAME: ${{ inputs.speech_secret_name }}
        run: |
          SPEECH_KEY=$(az cognitiveservices account keys list \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SPEECH_ACCOUNT_NAME" \
            --query "$KEY_SLOT" \
            --output tsv)

          if [ -z "$SPEECH_KEY" ]; then
            echo "Failed to read Speech key from slot: $KEY_SLOT"
            exit 1
          fi

          # Prevent accidental key exposure in logs.
          echo "::add-mask::$SPEECH_KEY"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --value "$SPEECH_KEY" \
            --output none

          SECRET_ID=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query id \
            --output tsv)

          echo "Stored secret: $SECRET_NAME"
          echo "Secret ID: $SECRET_ID"

      - name: Store GitHub OAuth secret in Key Vault
        if: ${{ inputs.secret_target == 'github-oauth' }}
        shell: bash
        env:
          KEY_VAULT_NAME: ${{ inputs.key_vault_name || vars.AZURE_KEY_VAULT_NAME }}
          SECRET_NAME: github-oauth-client-secret
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_OAUTH_CLIENT_SECRET }}
        run: |
          echo "::add-mask::$OAUTH_GITHUB_CLIENT_SECRET"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --value "$OAUTH_GITHUB_CLIENT_SECRET" \
            --output none

          SECRET_ID=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query id \
            --output tsv)

          echo "Stored secret: $SECRET_NAME"
          echo "Secret ID: $SECRET_ID"

      - name: Verify secret metadata
        shell: bash
        env:
          KEY_VAULT_NAME: ${{ inputs.key_vault_name || vars.AZURE_KEY_VAULT_NAME }}
          SECRET_NAME: ${{ inputs.secret_target == 'github-oauth' && 'github-oauth-client-secret' || inputs.speech_secret_name }}
        run: |
          az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query "{id:id, updated:attributes.updated, enabled:attributes.enabled}" \
            --output table
