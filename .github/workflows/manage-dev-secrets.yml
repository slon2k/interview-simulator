name: Manage Dev Secrets

on:
  workflow_dispatch:
    inputs:
      speech_account_name:
        description: "Azure Speech account name"
        required: true
        type: string
      key_vault_name:
        description: "Key Vault name"
        required: true
        type: string
      secret_name:
        description: "Key Vault secret name to store the Speech key"
        required: false
        default: "azure-speech-key"
        type: string
      key_slot:
        description: "Speech key slot to read"
        required: true
        default: "key1"
        type: choice
        options:
          - key1
          - key2
      rotate_key:
        description: "Regenerate selected key slot before storing"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: manage-dev-secrets
  cancel-in-progress: false

jobs:
  manage-dev-secrets:
    name: Rotate and store Speech key
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Validate required configuration
        shell: bash
        run: |
          if [ -z "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "Missing GitHub variable: AZURE_CLIENT_ID"
            exit 1
          fi

          if [ -z "${{ vars.AZURE_TENANT_ID }}" ]; then
            echo "Missing GitHub variable: AZURE_TENANT_ID"
            exit 1
          fi

          if [ -z "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "Missing GitHub variable: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          if [ -z "${{ vars.AZURE_RESOURCE_GROUP }}" ]; then
            echo "Missing GitHub variable: AZURE_RESOURCE_GROUP"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Rotate Speech key (optional)
        if: ${{ inputs.rotate_key }}
        shell: bash
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SPEECH_ACCOUNT_NAME: ${{ inputs.speech_account_name }}
          KEY_SLOT: ${{ inputs.key_slot }}
        run: |
          echo "Regenerating $KEY_SLOT for Speech account $SPEECH_ACCOUNT_NAME"
          az cognitiveservices account keys regenerate \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SPEECH_ACCOUNT_NAME" \
            --key-name "$KEY_SLOT" \
            --output none

      - name: Read Speech key and store in Key Vault
        shell: bash
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SPEECH_ACCOUNT_NAME: ${{ inputs.speech_account_name }}
          KEY_SLOT: ${{ inputs.key_slot }}
          KEY_VAULT_NAME: ${{ inputs.key_vault_name }}
          SECRET_NAME: ${{ inputs.secret_name }}
        run: |
          SPEECH_KEY=$(az cognitiveservices account keys list \
            --resource-group "$RESOURCE_GROUP" \
            --name "$SPEECH_ACCOUNT_NAME" \
            --query "$KEY_SLOT" \
            --output tsv)

          if [ -z "$SPEECH_KEY" ]; then
            echo "Failed to read Speech key from slot: $KEY_SLOT"
            exit 1
          fi

          # Prevent accidental key exposure in logs.
          echo "::add-mask::$SPEECH_KEY"

          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --value "$SPEECH_KEY" \
            --output none

          SECRET_ID=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query id \
            --output tsv)

          echo "Stored secret: $SECRET_NAME"
          echo "Secret ID: $SECRET_ID"

      - name: Verify secret metadata
        shell: bash
        env:
          KEY_VAULT_NAME: ${{ inputs.key_vault_name }}
          SECRET_NAME: ${{ inputs.secret_name }}
        run: |
          az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query "{id:id, updated:attributes.updated, enabled:attributes.enabled}" \
            --output table
